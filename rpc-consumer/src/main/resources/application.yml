# RPC Consumer Configuration

# ZooKeeper配置
zookeeper:
  host: 172.31.151.142
  port: 2181
  root-path: RPC
  retry-path: CanRetry
  session-timeout: 40000
  connection-timeout: 15000

# 客户端配置
client:
  # 负载均衡策略: round(轮询), random(随机)
  load-balance: round

# 序列化配置
serializer:
  # 序列化类型: json, object
  type: json

# 容错配置
fault-tolerance:
  # 重试配置
  retry:
    enabled: true
    max-attempts: 3
    wait-time: 700
    wait-time-unit: MILLISECONDS
  
  # 熔断器配置
  circuit-breaker:
    enabled: true
    failure-threshold: 2
    half-open-success-rate: 0.4
    rest-time-period: 3000

# 日志配置
logging:
  level: INFO
